name: coldat-prod

services:
  db:
    image: postgres:18-alpine
    container_name: coldat-db
    env_file:
      - ./env.production.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coldat}
      POSTGRES_USER: ${POSTGRES_USER:-coldat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ColdAT_db_2026_Qz8vV7D9mT4x}
    volumes:
      - coldat_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coldat-redis
    env_file:
      - ./env.production.example
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - coldat_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: coldat-minio
    env_file:
      - ./env.production.example
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - coldat_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: coldat-minio-setup
    env_file:
      - ./env.production.example
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" --api s3v4;
      mc mb --ignore-existing "local/$$MINIO_BUCKET_NAME";
      echo "MinIO bucket $$MINIO_BUCKET_NAME is ready.";
      '
    restart: "no"

  backend:
    container_name: coldat-backend
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: coldat-backend:prod
    env_file:
      - ./env.production.example
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: coldat-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # YENİ SATIR: Sunucudaki hazır dist klasörünü doğrudan Nginx'in içine bağlıyoruz
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  coldat_pgdata:
  coldat_redisdata:
  coldat_miniodata: