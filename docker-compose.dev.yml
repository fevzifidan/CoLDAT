name: CoLDAT

services:
  # ========================
  # PostgreSQL 18
  # ========================
  db:
    container_name: "coldat-db"
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: coldat_dev
      POSTGRES_USER: coldat_user
      POSTGRES_PASSWORD: coldat_password
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldat_user -d coldat_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ========================
  # MinIO Object Storage
  # ========================
  minio:
    container_name: "coldat-minio"
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coldat_minio_user
      MINIO_ROOT_PASSWORD: coldat_minio_password
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  # ========================
  # MinIO Initial Setup
  # Creates bucket and applies browser CORS policy
  # ========================
  minio-setup:
    container_name: "coldat-minio-setup"
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./minio-cors.json:/config/minio-cors.json:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 coldat_minio_user coldat_minio_password; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/coldat-assets;
      mc cors set local/coldat-assets /config/minio-cors.json;
      echo 'MinIO bucket and CORS setup completed.';
      "
    restart: "no"

  # ========================
  # Django Backend
  # ========================
  backend:
    container_name: "coldat-backend"
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

    environment:
      DB_NAME: coldat_dev
      DB_USER: coldat_user
      DB_PASSWORD: coldat_password
      DB_HOST: db
      DB_PORT: 5432

      DJANGO_SETTINGS_MODULE: config.settings.dev

      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"

      # Browser-facing MinIO URL. Presigned URLs returned to frontend use this.
      MINIO_ENDPOINT: http://localhost:9000

      # Docker-internal MinIO URL. Django uses this when talking to MinIO from backend container.
      MINIO_INTERNAL_ENDPOINT: http://minio:9000

      MINIO_ACCESS_KEY: coldat_minio_user
      MINIO_SECRET_KEY: coldat_minio_password
      MINIO_BUCKET_NAME: coldat-assets
      MINIO_REGION: us-east-1
      MINIO_USE_SSL: "False"

      ASSET_UPLOAD_URL_EXPIRES_IN_SECONDS: "900"
      ASSET_READ_URL_EXPIRES_IN_SECONDS: "900"

    depends_on:
      db:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    restart: "no"

  # ========================
  # Frontend
  # ========================
  frontend:
    container_name: "coldat-frontend"
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "false"
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8000/api/v1

volumes:
  pgdata:
  miniodata: